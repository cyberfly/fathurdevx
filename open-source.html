<!-- Open Source Page -->
<div x-data="openSourcePage">
  <!-- Hero Section -->
  <section class="max-w-4xl mx-auto text-center mb-20 relative px-4">
    <!-- Decorative blobs -->
    <div class="hidden md:block absolute top-0 -left-12 w-24 h-24 bg-tertiary rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
    <div class="hidden md:block absolute top-0 -right-4 w-24 h-24 bg-secondary rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-2000"></div>

    <h1 class="font-heading font-black text-5xl md:text-6xl text-foreground mb-6 relative z-10">
      Open
      <span class="text-accent relative inline-block">
        Source
        <svg class="absolute w-full h-3 -bottom-2 left-0 text-secondary" viewBox="0 0 100 10" preserveAspectRatio="none">
          <path d="M0 5 Q 50 10 100 5" stroke="currentColor" stroke-width="3" fill="none"></path>
        </svg>
      </span>
    </h1>
    <p class="text-xl text-mutedForeground max-w-2xl mx-auto">
      Selected projects I've open-sourced on GitHub. Feel free to explore, fork, and contribute.
    </p>
  </section>

  <!-- Loading State: 6 skeleton cards -->
  <section x-show="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
    <template x-for="i in 6" :key="i">
      <div class="bg-white border-2 border-border-dark rounded-xl shadow-hard overflow-hidden animate-pulse">
        <div class="h-3 bg-muted w-full"></div>
        <div class="p-6 space-y-4">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-muted"></div>
            <div class="h-3 bg-muted rounded w-24"></div>
          </div>
          <div class="h-5 bg-muted rounded w-3/4"></div>
          <div class="space-y-2">
            <div class="h-3 bg-muted rounded w-full"></div>
            <div class="h-3 bg-muted rounded w-5/6"></div>
            <div class="h-3 bg-muted rounded w-4/6"></div>
          </div>
          <div class="flex gap-2">
            <div class="h-6 w-16 bg-muted rounded-full"></div>
            <div class="h-6 w-16 bg-muted rounded-full"></div>
          </div>
          <div class="flex items-center justify-between pt-2">
            <div class="flex gap-4">
              <div class="h-4 w-12 bg-muted rounded"></div>
              <div class="h-4 w-12 bg-muted rounded"></div>
            </div>
            <div class="h-4 w-20 bg-muted rounded"></div>
          </div>
        </div>
      </div>
    </template>
  </section>

  <!-- Error State -->
  <section x-show="error && !loading" x-cloak class="mb-20">
    <div class="max-w-lg mx-auto text-center bg-white border-2 border-border-dark rounded-xl shadow-hard p-12">
      <div class="w-16 h-16 bg-secondary/20 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-secondary">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" x2="12" y1="8" y2="12"/>
          <line x1="12" x2="12.01" y1="16" y2="16"/>
        </svg>
      </div>
      <h2 class="font-heading font-bold text-2xl mb-3">Couldn't load repos</h2>
      <p class="text-mutedForeground mb-8" x-text="error"></p>
      <button
        @click="init()"
        class="inline-flex items-center gap-2 px-6 py-3 bg-accent text-white font-bold rounded-full border-2 border-border-dark shadow-hard hover:shadow-hard-hover hover:-translate-y-0.5 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Retry
      </button>
    </div>
  </section>

  <!-- Repos Grid -->
  <section x-show="!loading && !error" x-cloak class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
    <template x-for="repo in repos" :key="repo.id">
      <a :href="repo.html_url" target="_blank" rel="noopener noreferrer" class="group block">
        <div class="bg-white border-2 border-border-dark rounded-xl shadow-hard group-hover:shadow-hard-hover group-hover:-translate-y-2 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] overflow-hidden h-full flex flex-col">
          <!-- Top accent bar (language color) -->
          <div
            class="h-2 w-full"
            :style="repo.language ? `background-color: ${getLanguageColor(repo.language)}` : 'background-color: #E2E8F0'"
          ></div>

          <div class="p-6 flex-1 flex flex-col">
            <!-- Language -->
            <div class="flex items-center gap-2 text-sm text-mutedForeground mb-3 font-medium" x-show="repo.language">
              <span
                class="w-3 h-3 rounded-full border border-border-dark flex-shrink-0"
                :style="`background-color: ${getLanguageColor(repo.language)}`"
              ></span>
              <span x-text="repo.language"></span>
            </div>

            <!-- Repo name -->
            <h3
              class="font-heading font-bold text-xl mb-2 group-hover:text-accent transition-colors"
              x-text="repo.name"
            ></h3>

            <!-- Description -->
            <p
              class="text-mutedForeground text-sm line-clamp-3 mb-4 flex-1"
              x-text="repo.description || 'No description provided.'"
            ></p>

            <!-- Topics -->
            <div class="flex flex-wrap gap-2 mb-4" x-show="repo.topics && repo.topics.length > 0">
              <template x-for="topic in repo.topics.slice(0, 4)" :key="topic">
                <span
                  class="text-xs font-bold px-2 py-1 bg-muted rounded-md border border-border-dark"
                  x-text="topic"
                ></span>
              </template>
            </div>

            <!-- Stats + Link -->
            <div class="flex items-center justify-between pt-3 border-t border-border">
              <div class="flex items-center gap-4 text-sm text-mutedForeground font-medium">
                <span class="flex items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-tertiary">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                  </svg>
                  <span x-text="repo.stargazers_count"></span>
                </span>
                <span class="flex items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="18" r="3"/>
                    <circle cx="6" cy="6" r="3"/>
                    <circle cx="18" cy="6" r="3"/>
                    <path d="M18 9v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V9"/>
                    <path d="M12 12v3"/>
                  </svg>
                  <span x-text="repo.forks_count"></span>
                </span>
              </div>
              <span class="flex items-center gap-1 text-accent font-bold text-sm">
                View on GitHub
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform">
                  <path d="M7 7h10v10"/>
                  <path d="M7 17 17 7"/>
                </svg>
              </span>
            </div>
          </div>
        </div>
      </a>
    </template>
  </section>

  <!-- Footer CTA -->
  <section class="mt-20">
    <div class="bg-quaternary border-2 border-border-dark rounded-2xl p-12 relative overflow-hidden text-center shadow-hard">
      <div class="absolute top-4 left-4 text-white opacity-50">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      </div>
      <div class="absolute bottom-4 right-4 text-white opacity-50">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><rect width="20" height="20"/></svg>
      </div>
      <h2 class="font-heading font-black text-3xl md:text-5xl text-foreground mb-6 relative z-10">
        Want to collaborate? <br />
        <span class="text-white drop-shadow-[4px_4px_0_#1E293B]">Let's build together.</span>
      </h2>
      <a
        href="https://github.com/cyberfly"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-block px-10 py-5 bg-white text-foreground font-bold text-xl rounded-full border-2 border-border-dark shadow-hard hover:shadow-hard-hover hover:scale-105 transition-all duration-300 relative z-10"
      >
        View GitHub Profile
      </a>
    </div>
  </section>
</div>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('openSourcePage', () => ({
      SELECTED_REPOS: [
        'imagine',
        'staticbase',
        'vscode-uploader',
        'ezmath',
        'nexus-admin',
        'dahbayar',
        'promptgen',
        'linkedwind',
      ],
      repos: [],
      loading: false,
      error: null,

      getLanguageColor(language) {
        const colors = {
          JavaScript: '#f1e05a',
          TypeScript: '#3178c6',
          PHP: '#4F5D95',
          Python: '#3572A5',
          Vue: '#41b883',
          CSS: '#563d7c',
          HTML: '#e34c26',
          Ruby: '#701516',
          Go: '#00ADD8',
          Rust: '#dea584',
          Java: '#b07219',
          'C#': '#178600',
          Shell: '#89e051',
          Dart: '#00B4AB',
          Swift: '#F05138',
          Kotlin: '#A97BFF',
        };
        return colors[language] || '#8B5CF6';
      },

      async init() {
        if (this.loading) return;
        this.loading = true;
        this.error = null;
        try {
          const CACHE_KEY = 'cyberfly_repos';
          const CACHE_TTL = 24 * 60 * 60 * 1000; // 1 day in ms
          const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
          let data;
          if (cached && Date.now() - cached.ts < CACHE_TTL) {
            data = cached.data;
          } else {
            const response = await fetch('https://api.github.com/users/cyberfly/repos?per_page=100&sort=updated');
            if (response.status === 403) throw new Error('GitHub API rate limit reached. Please try again in a few minutes.');
            if (!response.ok) throw new Error('GitHub API request failed (' + response.status + ')');
            data = await response.json();
            localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
          }
          this.repos = data
            .filter(repo => this.SELECTED_REPOS.includes(repo.name))
            .sort((a, b) => this.SELECTED_REPOS.indexOf(a.name) - this.SELECTED_REPOS.indexOf(b.name));
          this.loading = false;
        } catch (err) {
          this.error = err.message;
          this.loading = false;
        }
      },
    }));
  });
</script>
